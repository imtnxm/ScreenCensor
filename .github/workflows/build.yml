name: Build ScreenCensor

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Generate and Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          echo "Available Xcode versions:"
          ls /Applications | grep -i xcode || true

          SELECTED=""
          for candidate in \
            "/Applications/Xcode_16.4.app" \
            "/Applications/Xcode_16.3.app" \
            "/Applications/Xcode_16.2.app" \
            "/Applications/Xcode_16.1.app" \
            "/Applications/Xcode_16.0.app" \
            "/Applications/Xcode.app"
          do
            if [ -d "${candidate}" ]; then
              SELECTED="${candidate}"
              break
            fi
          done

          if [ -z "${SELECTED}" ]; then
            echo "No usable Xcode.app found under /Applications"
            exit 1
          fi

          echo "Selecting ${SELECTED}"
          sudo xcode-select -s "${SELECTED}/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Convert NudeNet 320n to Core ML
        run: |
          set -euo pipefail
          python3 -m venv build/venv
          source build/venv/bin/activate
          python -m pip install --upgrade pip
          python Scripts/convert_nudenet_coreml.py \
            --work-dir build/model-work \
            --out-dir Resources/Models
          ls -la Resources/Models || true
        continue-on-error: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (ad-hoc signed)
        run: |
          set -euo pipefail
          mkdir -p build/DerivedData artifacts

          xcodebuild \
            -project ScreenCensor.xcodeproj \
            -scheme ScreenCensor \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build

          APP_PATH=$(find build/DerivedData/Build/Products -type d -name 'ScreenCensor.app' | head -n 1)
          if [ -z "${APP_PATH}" ]; then
            echo "ScreenCensor.app not found after build"
            find build/DerivedData/Build/Products -maxdepth 3 -print
            exit 1
          fi

          echo "Built app at: ${APP_PATH}"
          ditto "${APP_PATH}" "artifacts/ScreenCensor.app"
          codesign --force --deep --sign - "artifacts/ScreenCensor.app"
          codesign -dv --verbose=2 "artifacts/ScreenCensor.app" || true

          # Build a drag-and-drop DMG
          mkdir -p build/dmgroot
          ditto "artifacts/ScreenCensor.app" "build/dmgroot/ScreenCensor.app"
          ln -sf /Applications "build/dmgroot/Applications"
          cat > build/dmgroot/HOW_TO_OPEN.txt <<'EOF'
          ScreenCensor is ad-hoc signed (not notarized).
          After download:
            1. Open the DMG and drag ScreenCensor to Applications
            2. Run: xattr -dr com.apple.quarantine /Applications/ScreenCensor.app
            3. Right-click ScreenCensor.app → Open (first launch)
            4. Grant Screen Recording permission when prompted
          EOF

          hdiutil create \
            -volname "ScreenCensor" \
            -srcfolder build/dmgroot \
            -ov \
            -format UDZO \
            "artifacts/ScreenCensor.dmg"

          ls -lah artifacts

      - name: Upload ScreenCensor.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCensor-macOS-app
          path: artifacts/ScreenCensor.app
          if-no-files-found: error
          retention-days: 14

      - name: Upload ScreenCensor.dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCensor-macOS-dmg
          path: artifacts/ScreenCensor.dmg
          if-no-files-found: error
          retention-days: 14
