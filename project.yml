name: ScreenCensor
options:
  bundleIdPrefix: com.screencensor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ONLY_ACTIVE_ARCH: YES
    ENABLE_HARDENED_RUNTIME: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  ScreenCensor:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources/Assets.xcassets
        type: assetCatalog
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "ScreenCensor.entitlements"
          - "Models/README.md"
          - "Models/.gitkeep"
          - "Assets.xcassets"
          - "ThirdParty/ATTRIBUTION.md"
          - "ThirdParty/CC0-PIXELART-ICONS-LICENSE.txt"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screencensor.app
        PRODUCT_NAME: ScreenCensor
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ScreenCensor Pro
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 ScreenCensor. Licensed under AGPL-3.0."
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "ScreenCensor needs Screen Recording access to detect and censor body parts in real time on your display. Capture stays on-device and is never uploaded."
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Resources/ScreenCensor.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_TESTABILITY: YES
    entitlements:
      path: Resources/ScreenCensor.entitlements

  ScreenCensorTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
      - path: Sources/Capture/FrameGeometry.swift
      - path: Sources/App/RegionTracker.swift
      - path: Sources/App/CensorModels.swift
      - path: Sources/App/DetectionTypes.swift
      - path: Sources/ML/PartRuleEngine.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screencensor.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/../Frameworks"

schemes:
  ScreenCensor:
    build:
      targets:
        ScreenCensor: all
        ScreenCensorTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScreenCensorTests
    archive:
      config: Release
